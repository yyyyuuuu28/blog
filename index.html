<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo"><a href="index.html">My Blog</a></div>
            <nav class="nav">
                <ul>
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn">&#9776;</button>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>My Blog</h1>
            <p class="subtitle">Welcome to my blog where I share my thoughts and experiences.</p>
            <div class="hero-links">
                <a href="ielts/" class="btn-primary">Read Latest</a>
                <a href="about.html" class="btn-secondary">About Me</a>
            </div>
        </section>

        <section class="posts" id="posts">
            <h2 style="text-align: center; margin-bottom: 1rem;">Latest Post</h2>
            <div class="posts-grid">
                <article class="post-card">
                    <div class="post-meta">
                        <span class="category">雅思备考</span>
                        <time datetime="2025-04-24">April 24, 2025</time>
                    </div>
                    <h3><a href="ielts/">3个月雅思备考经验</a></h3>
                    <p style="padding: 0 1rem; color: var(--text-light); margin-bottom: 1rem;">
                        陈思豫的雅思首考心得分享，涵盖听力、阅读、写作、口语四个科目的备考策略，总分6.5。
                    </p>
                    <a href="ielts/" class="read-more">Read More</a>
                </article>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-section">
                <h4>Connect</h4>
                <p><a href="https://github.com/yyyyuuuu28" target="_blank">GitHub</a></p>
            </div>
            <div class="footer-bottom">
                <p>My Blog</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
